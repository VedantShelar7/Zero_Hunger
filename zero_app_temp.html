<body class="bg-surface-container-highest min-h-screen flex items-center justify-center p-4">
<!-- Mobile Frame Wrapper -->
<div class="relative w-full max-w-[400px] h-[850px] bg-[#FFFBF5] rounded-[40px] overflow-hidden shadow-2xl border-[8px] border-white flex flex-col">
<!-- Header / Nav -->
<header class="flex justify-between items-center px-5 h-16 w-full top-0 z-50 bg-[#FFFBF5]">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">restaurant</span>
<h1 class="text-xl font-extrabold text-primary-container tracking-tight font-headline-md">Food Sahaya</h1>
</div>
<button class="text-stone-500 hover:text-primary-container transition-colors">
<span class="material-symbols-outlined">help</span>
</button>
</header>
<!-- Main Content -->
<main class="flex-1 overflow-y-auto px-container-margin py-stack-lg flex flex-col gap-stack-lg pb-section-padding">
<!-- Type Toggle -->
<div class="flex bg-white rounded-full p-1 shadow-sm border border-outline-variant">
<button class="flex-1 py-2 px-4 rounded-full bg-primary-container text-white font-title-sm text-center shadow-md transition-all">
                    Business Donor
                </button>
<button class="flex-1 py-2 px-4 rounded-full text-on-surface-variant font-title-sm text-center hover:bg-surface-container transition-all">
                    Household Donor
                </button>
</div>
<div class="flex flex-col gap-stack-sm text-center pt-stack-sm">
<h2 class="font-headline-md text-headline-md text-on-surface">Join the Network</h2>
<p class="font-body-sm text-body-sm text-on-surface-variant">Select your business type to start donating surplus food.</p>
</div>
<!-- Business Type Grid -->
<div class="grid grid-cols-2 gap-3">
<button class="flex flex-col items-center justify-center p-4 rounded-xl border-2 border-primary-container bg-primary-container/10 text-primary-container transition-all shadow-[0_2px_4px_rgba(249,115,22,0.08)]">
<span class="material-symbols-outlined text-3xl mb-2" style="font-variation-settings: 'FILL' 1;">restaurant</span>
<span class="font-title-sm text-title-sm">Restaurant</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-xl border border-outline-variant bg-white text-on-surface-variant hover:border-primary-container/50 hover:bg-surface-container transition-all shadow-sm">
<span class="material-symbols-outlined text-3xl mb-2">storefront</span>
<span class="font-title-sm text-title-sm">Supermarket</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-xl border border-outline-variant bg-white text-on-surface-variant hover:border-primary-container/50 hover:bg-surface-container transition-all shadow-sm">
<span class="material-symbols-outlined text-3xl mb-2">room_service</span>
<span class="font-title-sm text-title-sm">Caterer</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-xl border border-outline-variant bg-white text-on-surface-variant hover:border-primary-container/50 hover:bg-surface-container transition-all shadow-sm">
<span class="material-symbols-outlined text-3xl mb-2">bed</span>
<span class="font-title-sm text-title-sm">Hotel/Banquet</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-xl border border-outline-variant bg-white text-on-surface-variant hover:border-primary-container/50 hover:bg-surface-container transition-all shadow-sm">
<span class="material-symbols-outlined text-3xl mb-2">business</span>
<span class="font-title-sm text-title-sm">Corporate Café</span>
</button>
<button class="flex flex-col items-center justify-center p-4 rounded-xl border border-outline-variant bg-white text-on-surface-variant hover:border-primary-container/50 hover:bg-surface-container transition-all shadow-sm">
<span class="material-symbols-outlined text-3xl mb-2">category</span>
<span class="font-title-sm text-title-sm">Other</span>
</button>
</div>
<!-- Form Fields -->
<form class="flex flex-col gap-stack-md mt-stack-sm">
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-2">BUSINESS NAME</label>
<input class="w-full bg-white border border-outline-variant rounded-xl px-4 py-3 font-body-base text-body-base text-on-surface focus:outline-none focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 transition-all shadow-sm placeholder:text-outline" placeholder="Enter business name" type="text"/>
</div>
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-2">PHONE OR EMAIL</label>
<input class="w-full bg-white border border-outline-variant rounded-xl px-4 py-3 font-body-base text-body-base text-on-surface focus:outline-none focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 transition-all shadow-sm placeholder:text-outline" placeholder="Contact details" type="text"/>
</div>
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-2">PASSWORD</label>
<div class="relative">
<input class="w-full bg-white border border-outline-variant rounded-xl px-4 py-3 font-body-base text-body-base text-on-surface focus:outline-none focus:border-primary-container focus:ring-2 focus:ring-primary-container/20 transition-all shadow-sm placeholder:text-outline" placeholder="Create a password" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface-variant" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Actions -->
<div class="flex flex-col gap-stack-sm mt-stack-md">
<button class="w-full bg-gradient-to-r from-primary-container to-primary text-white font-title-sm text-title-sm py-4 rounded-full shadow-[0_8px_16px_rgba(249,115,22,0.15)] hover:shadow-[0_12px_24px_rgba(249,115,22,0.2)] transition-all active:scale-[0.98]" type="button">
                        Continue as Business
                    </button>
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink-0 mx-4 font-body-sm text-body-sm text-on-surface-variant">or</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<button class="w-full bg-white border-2 border-outline-variant text-on-surface font-title-sm text-title-sm py-3 rounded-full shadow-sm flex items-center justify-center gap-2 hover:bg-surface-container transition-all active:scale-[0.98]" type="button">
<img alt="Google logo" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAgHPGXQXsov2ryohmq-Ek5Ps9AqdDreTW4hc7HXnsvIKv4QPRBQdsAOYRvF0wNQfwysdPS8a0cqkE0Q9oGttQBYfjG37Jwc60-bAZz4zP7pwM05xmzqm-N7K5A7h8qY8ehKS-rK0EeNDO2Wt5D-wpb22zr0aAWM6SG7igXYZQ17fhxXCWrb3D2Q3CiHHPt0Y_9zRsL0GqP1ZUSnrBGaDwh59z9mgF1e11lQvL2CfY8MM813sF_ZpotoXE3fZdCPsZR2k9hsrZJVbc"/>
                        Sign in with Google
                    </button>
</div>
</form>
<div class="text-center mt-auto pt-stack-md">
<p class="font-body-sm text-body-sm text-on-surface-variant">
                    Already have an account? <a class="text-primary-container font-semibold hover:underline" href="#">Sign in</a>
</p>
</div>

</div>
