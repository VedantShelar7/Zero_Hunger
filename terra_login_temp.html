        body { font-family: 'Inter', sans-serif; }
        h1, h2, h3, .brand-logo { font-family: 'Manrope', sans-serif; }

<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Subtle Background Texture/Image Overlay -->
<div class="absolute inset-0 z-0">
<img alt="" class="w-full h-full object-cover opacity-20 blur-sm" data-alt="Lush green fields and a modern sustainable farm at a golden sunrise" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDfTeaSVOvLaCRy4wrNEFczBjFydSWckEKLLwHruTCKTAfhuw3aZZflLAYu-keto5rjhst8coRJZq2By89hHrhVUifFjqxAOQdZb35xIndqtnCwMKJaxPF7urf9gY5nkgqYfhEddEtwxWM5WfTuA5fl-TuGkj9t5P6uCg56ZKZS78VLACYhgGMHWmBjt5RCg88ekMKEAxNbgmwSTfpnVszhcDoOs4UUljdRUgVO6yNRj3cIRgGCjT-9te4AZ21MOklLuYx2rVMUnBJo"/>
<div class="absolute inset-0 bg-surface/60 backdrop-blur-[2px]"></div>
</div>
<!-- Main Content Container -->
<main class="relative z-10 w-full max-w-md px-6 py-12">
<!-- Logo Branding -->
<div class="flex flex-col items-center mb-10">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="tempest">storm</span>
<span class="text-3xl font-extrabold tracking-tighter text-primary">Terra Nova</span>
</div>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-2xl shadow-[0px_20px_40px_rgba(27,29,14,0.06)] p-8 md:p-10">
<div class="mb-8">
<h1 class="text-3xl font-bold text-on-surface tracking-tight mb-2">Welcome Back</h1>
<p class="text-on-surface-variant text-base">Sign in to manage your farm's digital ledger.</p>
</div>
<form action="#" class="space-y-6" method="POST">
<!-- Email Field -->
<div>
<label class="block text-xs font-bold tracking-widest text-on-surface-variant uppercase mb-2 ml-1" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="mail">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-highest rounded-xl border-none focus:ring-2 focus:ring-primary/30 text-on-surface placeholder:text-outline transition-all duration-200" id="email" name="email" placeholder="farmer@terranova.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<label class="block text-xs font-bold tracking-widest text-on-surface-variant uppercase mb-2 ml-1" for="password">Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="lock">lock</span>
<input class="w-full pl-12 pr-12 py-4 bg-surface-container-highest rounded-xl border-none focus:ring-2 focus:ring-primary/30 text-on-surface placeholder:text-outline transition-all duration-200" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Utilities -->
<div class="flex items-center justify-between py-1">
<label class="flex items-center cursor-pointer group">
<input class="w-5 h-5 rounded border-outline-variant bg-surface-container-highest text-primary focus:ring-primary/20 cursor-pointer" type="checkbox"/>
<span class="ml-3 text-sm text-on-surface-variant group-hover:text-on-surface transition-colors">Remember me</span>
</label>
<a class="text-sm font-semibold text-secondary hover:text-primary transition-colors" href="#">Forgot password?</a>
</div>
<!-- CTA Button -->
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold py-4 rounded-xl shadow-lg hover:shadow-xl active:scale-[0.98] transition-all duration-200" type="submit">
                    Sign In
                </button>
</form>
<!-- Divider -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/30"></div>
</div>
<div class="relative flex justify-center text-xs">
<span class="px-4 bg-surface-container-lowest text-on-surface-variant font-medium">Or sign in with</span>
</div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-xl border border-outline-variant/50 hover:bg-surface-container-high transition-all duration-200 text-on-surface font-medium">
<img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAE5n-4CXNz3QNUOJdahYkMeM6_Teyz6heO_sxmL_94gAGdPi4GljDT46-GlpwW_eyRm3rKaJNAgx8z1vsEDEGjN4KAfhZ239sW1YAuCTIYQk35bXrxZUzjV56L8M2DucLHVbsIgtZsbVRQ7kEQEL0NKT1HK70GiApegh0_XR4tjerSXKOwxWS_6DY2RBuJvqRDUKp09Px-mk_rwfIRuCJ7P__2iUn-xfHawKbXuvuebL13--hBigDASN6T17W3dqALzCwYzhriSOj6"/>
<span>Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 px-4 rounded-xl border border-outline-variant/50 hover:bg-surface-container-high transition-all duration-200 text-on-surface font-medium">
<span class="material-symbols-outlined text-xl" data-icon="apple" style="font-variation-settings: 'FILL' 1;">ios</span>
<span>Apple</span>
</button>
</div>
</div>
<!-- Form Footer -->
<p class="mt-8 text-center text-on-surface-variant">
            Don't have an account? 
            <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="#">Join the network</a>
</p>
</main>
<!-- Global Footer Fragment -->
<footer class="mt-auto w-full py-8 px-8 border-t border-outline-variant/10">
<div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4 text-xs font-label tracking-wide text-on-surface-variant opacity-70">
<div>
                © 2024 Terra Nova Digital. The Living Ledger.
            </div>
<div class="flex gap-6">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>

</div>
</div>
