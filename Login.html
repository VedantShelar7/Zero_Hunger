<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Food Sahaya - Sign In</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-container": "#0d7377",
                        "primary": "#00595c",
                        "on-primary": "#ffffff",
                        "on-surface": "#141b2b",
                        "on-surface-variant": "#3e4949",
                        "background": "#f9f9ff",
                        "surface": "#f9f9ff",
                        "outline-variant": "#bec9c9",
                        "secondary-container": "#fea619",
                        "on-secondary-container": "#684000",
                        "primary-fixed-dim": "#81d4d8"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "2xl": "20px"
                    },
                    "fontFamily": {
                        "body": ["Inter"],
                        "display": ["Inter"]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface font-body text-on-surface min-h-screen flex antialiased">
    <div class="flex w-full min-h-screen">
        <!-- Left Panel: Brand & Impact (Matching Registration Page) -->
        <div class="hidden lg:flex w-[40%] bg-primary-container text-on-primary relative flex-col justify-between overflow-hidden">
            <div class="absolute inset-0 z-0 opacity-20">
                <img class="w-full h-full object-cover mix-blend-overlay" alt="Abstract soft wave pattern" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBOmKBzggwSuvgCMbY7bbb4x1V_UPKG5D0qnlh3sRYOjsdnmm6zVmtgB83en7uAGgo8jfp135nMhaTJMRkv6jgQf8rPXqeE1N7Ref83Vl04n-bmwEsAzbrCVLjh5o5lCRuKkJVUbGFieCVuX4c0AVvSZWxzrRngGZRKmy-Z8Qpm29OIVg2ndUBgKTlkHdPA78QsiboDC37AM-6oBPiOs-VndF8pY5tyCmV7SLre7JF82lWdeByQxo2Uf68tOx767TsSVyY07GnpQOMH"/>
            </div>
            <div class="relative z-10 p-12 lg:p-16 flex flex-col h-full">
                <div class="mb-auto">
                    <div class="flex items-center gap-3 mb-12">
                        <span class="material-symbols-outlined text-4xl text-on-primary">volunteer_activism</span>
                        <span class="text-2xl font-bold text-on-primary">Food Sahaya</span>
                    </div>
                    <h1 class="text-5xl font-bold text-on-primary max-w-md leading-tight">
                        Welcome back to the movement.
                    </h1>
                </div>
            </div>
            <svg class="absolute bottom-0 w-full h-32 z-0" fill="none" preserveaspectratio="none" viewbox="0 0 1440 120" xmlns="http://www.w3.org/2000/svg">
                <path class="text-primary opacity-50" d="M0 120H1440V0C1440 0 1140 120 720 120C300 120 0 0 0 0V120Z" fill="currentColor"></path>
            </svg>
        </div>

        <!-- Right Panel: Login Form -->
        <div class="w-full lg:w-[60%] bg-[#F9F9F9] flex flex-col justify-center items-center p-6 sm:p-12 lg:p-24 overflow-y-auto">
            <div class="w-full max-w-md">
                <!-- Header -->
                <div class="mb-10 text-center lg:text-left">
                    <h2 class="text-3xl font-bold text-on-surface mb-2">Sign In</h2>
                    <p class="text-on-surface-variant">Access your dashboard to manage contributions and impact.</p>
                </div>

                <!-- Login Form -->
                <form id="login-form" class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1">Your Name / Business Name</label>
                        <input id="login-name" required class="w-full bg-white border border-outline-variant rounded-xl px-4 py-4 text-on-surface focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none transition-all" placeholder="e.g. Vedant's Kitchen or Vedant NGO" type="text"/>
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1">Email Address</label>
                        <input id="login-email" required class="w-full bg-white border border-outline-variant rounded-xl px-4 py-4 text-on-surface focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none transition-all" placeholder="name@example.com" type="email"/>
                    </div>

                    <div class="space-y-2">
                        <div class="flex justify-between items-center ml-1">
                            <label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant">Password</label>
                            <a href="#" class="text-xs font-bold text-primary-container hover:underline">Forgot password?</a>
                        </div>
                        <div class="relative">
                            <input id="login-password" required class="w-full bg-white border border-outline-variant rounded-xl px-4 py-4 text-on-surface focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none transition-all" placeholder="••••••••" type="password"/>
                            <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary-container">
                                <span class="material-symbols-outlined">visibility</span>
                            </button>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant ml-1">Dashboard Role</label>
                        <select id="login-role" class="w-full bg-white border border-outline-variant rounded-xl px-4 py-4 text-on-surface focus:border-primary-container focus:ring-1 focus:ring-primary-container outline-none transition-all cursor-pointer">
                            <option value="Donor">Business Donor</option>
                            <option value="NGO">NGO / Demand Centre</option>
                            <option value="Volunteer">Volunteer</option>
                        </select>
                    </div>

                    <!-- Actions -->
                    <div class="pt-4 space-y-4">
                        <button class="w-full bg-primary-container text-on-primary rounded-xl py-4 font-bold shadow-lg hover:bg-primary transition-all active:scale-[0.98] flex justify-center items-center gap-2" type="submit">
                            Sign In
                            <span class="material-symbols-outlined text-[20px]">login</span>
                        </button>
                        
                        <div class="relative flex items-center py-2">
                            <div class="flex-grow border-t border-outline-variant"></div>
                            <span class="flex-shrink-0 mx-4 text-sm text-on-surface-variant font-medium">or</span>
                            <div class="flex-grow border-t border-outline-variant"></div>
                        </div>

                        <button class="w-full bg-white border-2 border-outline-variant text-on-surface rounded-xl py-3.5 font-semibold hover:bg-slate-50 transition-all flex justify-center items-center gap-3" type="button">
                            <img alt="Google Logo" class="w-5 h-5" src="https://www.google.com/favicon.ico"/>
                            Continue with Google
                        </button>
                    </div>

                    <div class="text-center pt-6">
                        <p class="text-on-surface-variant text-sm">
                            Don't have an account? <a class="text-primary-container font-bold hover:underline" href="Registration.html">Join Food Sahaya</a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script type="module" src="./src/js/auth.js"></script>
    <script type="module" src="./src/js/main.js"></script>
    <script>
      (function(){
        const form = document.getElementById('login-form');
        form.addEventListener('submit', function(e){
          e.preventDefault();
          const name = document.getElementById('login-name').value.trim() || 'Anonymous User';
          const email = document.getElementById('login-email').value.trim();
          const role = document.getElementById('login-role').value;
          
          if (window.auth && typeof window.auth.login === 'function') {
            window.auth.login(role, name);
          } else {
            localStorage.setItem('zh_user', JSON.stringify({ name, email, role, token: 'mock_' + Date.now() }));
            if(role === 'NGO') window.location.href = 'NGO_Dashboard.html';
            else if(role === 'Volunteer') window.location.href = 'Volunteer_Fleet.html';
            else window.location.href = 'Donor_Dashboard.html';
          }
        });
      })();
    </script>
</body>
</html>
