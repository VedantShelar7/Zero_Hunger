<div class="grid grid-cols-1 md:grid-cols-2 gap-stack-md">
<div class="flex flex-col gap-2 md:col-span-2">
<label class="font-label-sm text-label-sm text-on-surface uppercase tracking-wider" for="fullName">Full Name</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all" id="fullName" placeholder="Jane Doe" type="text"/>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-surface uppercase tracking-wider" for="email">Email Address</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all" id="email" placeholder="jane@example.com" type="email"/>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-surface uppercase tracking-wider" for="phone">Phone Number</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all" id="phone" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<div class="h-px w-full bg-outline-variant/30 my-6"></div>

<label class="font-label-sm text-label-sm text-on-surface uppercase tracking-wider" for="city">City</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all" id="city" placeholder="e.g. Bangalore" type="text"/>
</div>
<div class="flex flex-col gap-2">
<label class="font-label-sm text-label-sm text-on-surface uppercase tracking-wider" for="area">Area / Locality</label>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all" id="area" placeholder="e.g. Koramangala" type="text"/>
</div>
<div class="flex flex-col gap-2 md:col-span-2 mt-2">
<label class="font-label-sm text-label-sm text-on-surface uppercase tracking-wider" for="vehicle">Vehicle Type</label>
<div class="relative">
<select class="w-full appearance-none bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-all" id="vehicle">
<option disabled="" selected="" value="">Select your transport method</option>
<option value="bicycle">Bicycle</option>
<option value="two-wheeler">Two-Wheeler (Scooter/Bike)</option>
<option value="four-wheeler">Four-Wheeler (Car/Van)</option>
<option value="none">None (Walking/Public Transit)</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>

<label class="flex items-center gap-2 cursor-pointer group">

<span class="font-body-sm text-body-sm text-on-surface-variant group-hover:text-on-surface">Afternoons</span>

<label class="flex items-center gap-2 cursor-pointer group">

<label class="flex items-center gap-2 cursor-pointer group">
